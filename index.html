<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Noto+Serif+JP:wght@200;300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="gallery-wall">
    <header class="exhibit-header">
      <span class="exhibit-label">Collection</span>
      <h1>TODO</h1>
      <div class="header-rule"></div>
    </header>

    <form id="todo-form" class="todo-form">
      <input
        type="text"
        id="todo-input"
        placeholder="新しい作品を追加する..."
        autocomplete="off"
      >
      <button type="submit" aria-label="追加">+</button>
    </form>

    <nav class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <span class="filter-divider"></span>
      <button class="filter-btn" data-filter="active">In Progress</button>
      <span class="filter-divider"></span>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </nav>

    <ul id="todo-list" class="todo-list"></ul>

    <footer class="todo-footer">
      <span id="todo-count"></span>
      <button id="clear-completed" class="clear-btn" hidden>Clear completed</button>
    </footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
